name: Initial Setup & Train Models

on:
  workflow_dispatch:
    inputs:
      seasons:
        description: 'Comma-separated seasons to train on (e.g. 2022,2023,2024)'
        required: false
        default: '2022,2023,2024'
      skip_statcast:
        description: 'Skip Statcast fetch (if already cached in repo)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  setup_and_train:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours — Statcast download for 3 seasons is slow

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache pybaseball Statcast data
        uses: actions/cache@v3
        with:
          path: ~/.pybaseball/cache
          key: pybaseball-statcast-${{ hashFiles('data/processed/statcast/**') || github.run_id }}
          restore-keys: |
            pybaseball-statcast-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch FanGraphs data
        run: python data/fetch_fangraphs.py --seasons "${{ github.event.inputs.seasons }}"

      - name: Fetch Statcast data
        if: ${{ github.event.inputs.skip_statcast != 'true' }}
        run: python data/fetch_statcast.py --seasons "${{ github.event.inputs.seasons }}" --chunk-days 30
        timeout-minutes: 300  # 5 hours for Statcast

      - name: Skip Statcast message
        if: ${{ github.event.inputs.skip_statcast == 'true' }}
        run: echo "Skipping Statcast fetch — using existing data in repo"

      - name: Build historical feature matrix
        run: python features/build_feature_matrix.py --seasons "${{ github.event.inputs.seasons }}"

      - name: Train O/U model
        run: python models/train_ou.py

      - name: Train Moneyline model
        run: python models/train_moneyline.py

      - name: Train Run Line model
        run: python models/train_runline.py

      - name: Run backtest
        run: python backtest/backtest.py
        continue-on-error: true

      - name: Commit trained models and data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/*.pkl data/processed/ backtest/results/ || true
          git diff --staged --quiet || git commit -m "Auto: initial model training complete"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
