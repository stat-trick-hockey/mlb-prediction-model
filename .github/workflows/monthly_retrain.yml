name: Monthly Model Retrain

on:
  schedule:
    # 1st of every month at 6am ET (10am UTC)
    - cron: '0 10 1 * *'
  workflow_dispatch:
    inputs:
      seasons:
        description: 'Seasons to train on (comma-separated)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache pybaseball data
        uses: actions/cache@v3
        with:
          path: ~/.pybaseball/cache
          key: pybaseball-retrain-${{ github.run_id }}
          restore-keys: pybaseball-retrain-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine current season
        id: season
        run: |
          YEAR=$(python -c "
          from datetime import date
          today = date.today()
          # Use current year's season; fall back to prior year before April
          year = today.year if today.month >= 4 else today.year - 1
          print(year)
          ")
          echo "year=$YEAR" >> $GITHUB_OUTPUT
          echo "Current season: $YEAR"

      - name: Build seasons list
        id: seasons
        run: |
          INPUT="${{ github.event.inputs.seasons }}"
          if [ -z "$INPUT" ]; then
            # Auto: always train on 3 most recent complete/in-progress seasons
            YEAR=${{ steps.season.outputs.year }}
            SEASONS="$((YEAR-2)),$((YEAR-1)),$YEAR"
          else
            SEASONS="$INPUT"
          fi
          echo "seasons=$SEASONS" >> $GITHUB_OUTPUT
          echo "Training seasons: $SEASONS"

      - name: Refresh FanGraphs data
        run: python data/fetch_fangraphs.py --seasons "${{ steps.seasons.outputs.seasons }}"

      - name: Refresh Statcast data
        run: python data/fetch_statcast.py --seasons "${{ steps.seasons.outputs.seasons }}"

      - name: Rebuild historical feature matrix
        run: python features/build_feature_matrix.py --seasons "${{ steps.seasons.outputs.seasons }}"

      - name: Retrain O/U model
        run: python models/train_ou.py

      - name: Retrain moneyline model
        run: python models/train_moneyline.py

      - name: Retrain run line model
        run: python models/train_runline.py

      - name: Commit updated models and data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/*.pkl data/processed/ || true
          git diff --staged --quiet || git commit -m "Auto: monthly model retrain (${{ steps.seasons.outputs.seasons }})"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
